name: Rolling release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release-latest
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: zoa-reference-cli-windows-x64
            archive_ext: zip
          - os: ubuntu-latest
            artifact: zoa-reference-cli-linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            artifact: zoa-reference-cli-macos-arm64
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Create venv and install build dependencies
        run: |
          uv venv
          uv pip install -e ".[build]"

      - name: Build standalone binary
        run: uv run python build_exe.py

      - name: Archive build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist/${{ matrix.artifact }}" `
            -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Archive build (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf "${{ matrix.artifact }}.tar.gz" -C dist "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive_ext }}
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish rolling release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print0 \
            | xargs -0 -I{} cp {} release-assets/
          ls -lh release-assets

      - name: Delete existing 'latest' release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Create rolling 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Latest build ($(date -u +%Y-%m-%d))" \
            --notes "Rolling build from commit \`${GITHUB_SHA:0:7}\`. Download the archive for your platform and extract — no Python or Playwright setup required. Chromium is downloaded on first run (~150 MB, one-time) into \`~/.zoa-ref/browsers\`.

          **macOS users:** the binary is unsigned. First run needs either \`xattr -d com.apple.quarantine ./zoa-reference-cli\` or right-click → Open to bypass Gatekeeper." \
            --prerelease \
            release-assets/*
